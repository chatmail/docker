# Build and push the chatmail relay Docker image.
#
# Triggered three ways:
#   1. Push/PR to this repo (docker file changes) -- uses relay main as build context
#   2. repository_dispatch from chatmail/relay (relay-updated event) -- uses the
#      relayed relay_ref so the image reflects the exact relay commit being tested
#   3. Tag push relayed from chatmail/relay -- produces semver-tagged release images
#
# Image: ghcr.io/chatmail/docker
# Tags on push: sha-<relay-short>, branch/tag name, semver (on tags)
# Tags on docker-native push: sha-<docker-short>, main
# PRs from docker repo: build only, no push

name: Build and push Docker image
run-name: >-
  ${{ github.event_name == 'repository_dispatch'
      && format('relay {0} @ {1}',
         github.event.client_payload.relay_ref,
         github.event.client_payload.relay_sha_short)
      || format('{0} @ {1}', github.ref_name, github.sha) }}

on:
  push:
    branches: [main]
  pull_request:
    paths-ignore:
      - '**/README.md'
      - 'CHANGELOG.md'
      - 'LICENSE'
  repository_dispatch:
    types: [relay-updated]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: chatmail/docker

jobs:
  build:
    name: Build Docker image
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.short-tag.outputs.tag }}
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout relay repo as build context
        uses: actions/checkout@v4
        with:
          repository: chatmail/relay
          ref: ${{ github.event.client_payload.relay_ref || 'main' }}

      - name: Checkout docker repo
        uses: actions/checkout@v4
        with:
          path: docker

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            # Tagged releases: v1.2.3 -> :1.2.3, :1.2, :latest
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            # Branch pushes: main -> :main, feature/foo -> :feature-foo
            type=ref,event=branch
            # Always include sha
            type=sha

      - name: Add relay-specific tags for repository_dispatch
        id: tags
        run: |
          TAGS="${{ steps.meta.outputs.tags }}"
          if [ "${{ github.event_name }}" = "repository_dispatch" ]; then
            RELAY_REF="${{ github.event.client_payload.relay_ref }}"
            RELAY_SHA_SHORT="${{ github.event.client_payload.relay_sha_short }}"
            # sha tag for the relay commit
            TAGS="${TAGS}"$'\n'"${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:sha-${RELAY_SHA_SHORT}"
            # branch/tag: main -> :main, j4n/foo -> :j4n-foo, v1.2.3 -> :v1.2.3
            BRANCH_TAG=$(echo "${RELAY_REF}" | sed 's|/|-|g')
            TAGS="${TAGS}"$'\n'"${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${BRANCH_TAG}"
            # semver tags for release tags: 1.2.3 -> :1.2.3, :1.2, :latest
            if [[ "${RELAY_REF}" =~ ^v?([0-9]+)\.([0-9]+)\.([0-9]+)$ ]]; then
              VERSION="${BASH_REMATCH[1]}.${BASH_REMATCH[2]}.${BASH_REMATCH[3]}"
              MINOR="${BASH_REMATCH[1]}.${BASH_REMATCH[2]}"
              TAGS="${TAGS}"$'\n'"${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${VERSION}"
              TAGS="${TAGS}"$'\n'"${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${MINOR}"
              TAGS="${TAGS}"$'\n'"${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest"
            fi
          fi
          echo "tags<<EOF" >> "$GITHUB_OUTPUT"
          echo "${TAGS}" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Compute short tag for test job
        id: short-tag
        run: |
          if [ "${{ github.event_name }}" = "repository_dispatch" ]; then
            echo "tag=sha-${{ github.event.client_payload.relay_sha_short }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=sha-$(echo ${{ github.sha }} | cut -c1-7)" >> "$GITHUB_OUTPUT"
          fi

      - name: Copy .dockerignore to build context
        run: cp docker/.dockerignore .dockerignore

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/chatmail_relay.dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.tags.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            GIT_HASH=${{ github.event.client_payload.relay_sha || github.sha }}

  test:
    name: Integration test
    needs: build
    if: github.event_name != 'pull_request'
    uses: chatmail/cmlxc/.github/workflows/lxc-test.yml@main
    with:
      # TODO: remove pip install override once cmlxc docker support is on main
      cmlxc_commands: |
        pip install git+https://github.com/chatmail/cmlxc@j4n/docker-support
        cmlxc init
        cmlxc docker pull --tag ${{ needs.build.outputs.image_tag }}
        cmlxc docker deploy dock0 --source ghcr:${{ needs.build.outputs.image_tag }}
        cmlxc test-mini dock0
